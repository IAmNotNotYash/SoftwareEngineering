openapi: 3.0.3
info:
  title: Kala Platform Sprint 1 API
  version: 1.0.0
  description: |
    Swagger-compatible API documentation for the Sprint 1 endpoints that were
    verified with pytest in this repository.
servers:
  - url: http://localhost:5000
    description: Local Flask development server

tags:
  - name: Health
  - name: Auth
  - name: Commerce
  - name: Admin

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required: [status]
    RegisterRequest:
      type: object
      required: [email, password, role, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [buyer, artist]
        firstName:
          type: string
        lastName:
          type: string
        brandName:
          type: string
          description: Required when role is `artist`
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [buyer, artist, admin]
        name:
          type: string
        brandName:
          type: string
          nullable: true
    AuthResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'
      required: [message, token, user]
    ProductCreateRequest:
      type: object
      required: [title, price]
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        images:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                properties:
                  image_url:
                    type: string
                    format: uri
    ProductResponse:
      type: object
      properties:
        id:
          type: string
        artist_id:
          type: string
        artist_name:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        category:
          type: string
          nullable: true
        in_stock:
          type: boolean
        image:
          type: string
          nullable: true
        gallery:
          type: array
          items:
            type: string
    CartAddRequest:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: string
        quantity:
          type: integer
          default: 1
          minimum: 1
    CartItemResponse:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        title:
          type: string
        artist:
          type: string
        price:
          type: number
        image:
          type: string
          nullable: true
        quantity:
          type: integer
    PlaceOrderRequest:
      type: object
      required: [shipping_address, payment]
      properties:
        shipping_address:
          type: object
          additionalProperties: true
        payment:
          type: object
          additionalProperties: true
    OrderItem:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
          nullable: true
        title:
          type: string
        image:
          type: string
          nullable: true
        artist:
          type: string
        price:
          type: number
        quantity:
          type: integer
        line_total:
          type: number
    TrackingEvent:
      type: object
      properties:
        id:
          type: string
        event:
          type: string
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    OrderResponse:
      type: object
      properties:
        id:
          type: string
        display_id:
          type: string
        buyer_id:
          type: string
        artist_id:
          type: string
        status:
          type: string
        subtotal:
          type: number
        shipping_cost:
          type: number
        total:
          type: number
        shipping_address_snapshot:
          type: object
          additionalProperties: true
        payment_snapshot:
          type: object
          additionalProperties: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        tracking_events:
          type: array
          items:
            $ref: '#/components/schemas/TrackingEvent'
    AdminStatsResponse:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        registeredArtists:
          type: integer
        registeredBuyers:
          type: integer
        pendingVerifications:
          type: integer

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a buyer or artist account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/commerce/products:
    post:
      tags: [Commerce]
      summary: Create a new product
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '403':
          description: Artist not approved or invalid role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/commerce/cart:
    post:
      tags: [Commerce]
      summary: Add a product to the buyer cart
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartAddRequest'
      responses:
        '201':
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItemResponse'
        '200':
          description: Existing cart item quantity incremented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItemResponse'
  /api/commerce/orders:
    post:
      tags: [Commerce]
      summary: Place an order from the current cart
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '201':
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Empty cart or missing checkout details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Fetch admin dashboard stats
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Admin stats returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatsResponse'
        '403':
          description: Forbidden for non-admin users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
